spring.application.name=smart-parking-backend

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smart_parking?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${SMART_PARKING_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# 24 hours in milliseconds
jwt.expiration=86400000
# Generate a secret key. Ideally this should be in env variables.
jwt.secret=${SMART_PARKING_SECRET}

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMART_PARKING_GMAIL_USERNAME}
spring.mail.password=${SMART_PARKING_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
admin.email= ${SMART_PARKING_ADMIN_EMAIL}
admin.password=${SMART_PARKING_ADMIN_PASSWORD}